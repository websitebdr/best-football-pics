<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Pics in Football</title>
    <style>
        /* ==========================================
           1. CSS VARIABLES & RESET
           ========================================== */
        :root {
            --primary: #00ffcc;
            --secondary: #ff007f;
            --bg-dark: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition-smooth: 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom Cursor */
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            overflow-x: hidden;
        }

        /* ==========================================
           2. CUSTOM CURSOR
           ========================================== */
        #cursor, #cursor-follower {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        #cursor {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
        }

        #cursor-follower {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0, 255, 204, 0.5);
            border-radius: 50%;
            transition: width 0.3s, height 0.3s, background 0.3s;
        }

        .cursor-hover {
            width: 60px !important;
            height: 60px !important;
            background: rgba(0, 255, 204, 0.1);
            border-color: var(--primary) !important;
        }

        /* ==========================================
           3. PRELOADER
           ========================================== */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-text {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseGlow 2s infinite;
        }

        .loader-circle {
            width: 60px;
            height: 60px;
            border: 4px solid var(--glass-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-percent {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--primary);
        }

        /* ==========================================
           4. CANVAS PARTICLES & BACKGROUND
           ========================================== */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ==========================================
           5. HERO SECTION
           ========================================== */
        #hero {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        #hero-bg {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-size: cover;
            background-position: center;
            z-index: -2;
            transition: transform 0.1s ease-out; /* Parallax smooth */
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.3), rgba(10,10,10,1));
            backdrop-filter: blur(5px);
            z-index: -1;
        }

        #hero h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
            animation: slideUp 1s ease forwards;
            opacity: 0;
        }

        #hero p {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            animation: slideUp 1s ease 0.2s forwards;
            opacity: 0;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
            animation: slideUp 1s ease 0.4s forwards;
            opacity: 0;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary);
            border-color: var(--primary);
        }

        .btn:hover::before {
            left: 100%;
        }

        /* ==========================================
           6. MUSIC CONTROLS
           ========================================== */
        .music-controls {
            position: fixed;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .music-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: var(--transition-smooth);
        }

        .music-btn:hover {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.1);
        }

        .music-playing .play-icon { display: none; }
        .music-paused .pause-icon { display: none; }
        
        /* ==========================================
           7. MAIN LAYOUT & CONTROLS
           ========================================== */
        main {
            padding: 50px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            padding: 20px;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }

        .stats h2 {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            border-radius: 20px;
            transition: var(--transition-smooth);
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.5);
            color: white;
            outline: none;
            transition: var(--transition-smooth);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        /* ==========================================
           8. GALLERY & CARDS
           ========================================== */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 4/5;
            transform-style: preserve-3d;
            perspective: 1000px;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .card.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* Animated Border Magic */
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--primary));
            animation: rotateBorder 4s linear infinite;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-inner {
            position: absolute;
            inset: 3px;
            background: var(--bg-dark);
            border-radius: 12px;
            overflow: hidden;
            z-index: 2;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* 3D and Hover execution */
        .card:hover .card-inner {
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,204,0.3);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.5s ease;
            filter: grayscale(20%);
        }

        .card:hover img {
            transform: scale(1.1);
            filter: grayscale(0%);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 400% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        .card img.loading {
            opacity: 0;
        }
        
        .card img.loaded {
            opacity: 1;
        }

        .image-number {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: var(--primary);
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            z-index: 3;
            transform: translateY(20px);
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .card:hover .image-number {
            transform: translateY(0);
            opacity: 1;
        }

        /* ==========================================
           9. LIGHTBOX
           ========================================== */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        #lightbox.active {
            opacity: 1;
            visibility: visible;
        }

        .lb-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #lb-img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            user-select: none;
        }

        #lightbox.active #lb-img {
            transform: scale(1);
        }

        .lb-controls button {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            transition: var(--transition-smooth);
            z-index: 2;
        }

        .lb-controls button:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.1);
        }

        #lb-prev { left: -70px; top: 50%; transform: translateY(-50%); }
        #lb-next { right: -70px; top: 50%; transform: translateY(-50%); }
        #lb-close { top: -50px; right: -50px; }

        #lb-counter {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* ==========================================
           10. BACK TO TOP
           ========================================== */
        #back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: #000;
            border: none;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: var(--transition-smooth);
        }

        #back-to-top.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        #back-to-top:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 25px var(--primary);
        }

        /* ==========================================
           11. KEYFRAMES & ANIMATIONS
           ========================================== */
        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 10px rgba(0,255,204,0.5); }
            50% { text-shadow: 0 0 30px rgba(0,255,204,1); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideUp { 
            to { opacity: 1; transform: translateY(0); } 
            from { opacity: 0; transform: translateY(30px); }
        }
        @keyframes rotateBorder { 100% { transform: rotate(360deg); } }
        @keyframes shimmer { 100% { background-position: -400% 0; } }

        /* ==========================================
           12. RESPONSIVE DESIGN
           ========================================== */
        @media (max-width: 1024px) {
            #hero h1 { font-size: 4rem; }
            #lb-prev { left: 10px; }
            #lb-next { right: 10px; }
            #lb-close { top: -40px; right: 0; }
        }

        @media (max-width: 768px) {
            #cursor, #cursor-follower { display: none; } /* Disable custom cursor on touch */
            * { cursor: auto !important; }
            
            #hero h1 { font-size: 3rem; }
            .top-bar { flex-direction: column; text-align: center; }
            .controls { justify-content: center; }
            
            .music-controls { bottom: 20px; left: 20px; }
            #back-to-top { bottom: 20px; right: 20px; }
            
            #gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .card::before { display: none; } /* Disable heavy animation on mobile */
        }
    </style>
</head>
<body>

    <!-- CUSTOM CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <!-- PRELOADER -->
    <div id="preloader">
        <div class="loader-text">Best Pics in Football</div>
        <div class="loader-circle"></div>
        <div class="loader-percent" id="loader-percent">0%</div>
    </div>

    <!-- CANVAS PARTICLES -->
    <canvas id="particles-canvas"></canvas>

    <!-- MUSIC CONTROLS -->
    <div class="music-controls">
        <button class="music-btn music-paused" id="play-pause-btn" title="Play/Pause">
            <span class="play-icon">▶</span>
            <span class="pause-icon">⏸</span>
        </button>
        <button class="music-btn" id="mute-btn" title="Mute/Unmute">
            <span class="mute-icon">🔊</span>
        </button>
    </div>

    <!-- HERO SECTION -->
    <header id="hero">
        <!-- BACKGROUND IMAGE (Generated from music folder) -->
        <div id="hero-bg"></div>
        <div class="hero-overlay"></div>
        
        <h1>Best Pics in Football</h1>
        <p>The Greatest Football Images Ever Captured</p>
        <button class="btn hover-target" onclick="document.getElementById('gallery-section').scrollIntoView()">Explore Gallery</button>
    </header>

    <!-- MAIN CONTENT -->
    <main id="gallery-section">
        <div class="top-bar">
            <div class="stats">
                <h2>Total Images: <span id="image-count">0</span></h2>
            </div>
            
            <div class="controls">
                <button class="filter-btn active hover-target" data-filter="all">All</button>
                <button class="filter-btn hover-target" data-filter="1-99">1-99</button>
                <button class="filter-btn hover-target" data-filter="100-195">100-195</button>
                <button class="filter-btn hover-target" data-filter="196-244">196-244</button>
            </div>

            <div class="search-box">
                <input type="number" id="search-input" placeholder="Search Image Number..." class="hover-target" min="1" max="244">
            </div>
        </div>

        <section id="gallery"></section>
    </main>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <div class="lb-content">
            <img id="lb-img" src="" alt="Football Image">
            <div class="lb-controls">
                <button id="lb-close" class="hover-target">✕</button>
                <button id="lb-prev" class="hover-target">❮</button>
                <button id="lb-next" class="hover-target">❯</button>
            </div>
            <div id="lb-counter">1 / 244</div>
        </div>
    </div>

    <!-- BACK TO TOP -->
    <button id="back-to-top" class="hover-target">↑</button>

    <!-- ==========================================
         JAVASCRIPT
         ========================================== -->
    <script>
        /* =========================================================================
           CONFIG (EASILY EDITABLE)
           ========================================================================= */
        // ضع الرابط الأساسي الخاص بك على جيتهاب هنا
        // مثال: "https://raw.githubusercontent.com/websitebdr/best-football-pics/main"
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/websitebdr/best-football-pics/main"; 
        
        const TOTAL_IMAGES = 244;

        // إعدادات الصوت والخلفية
        const MUSIC_URL = `${GITHUB_BASE_URL}/music/music.mp3`;
        const BACKGROUND_IMG_URL = `${GITHUB_BASE_URL}/music/background image.jpg`;

        /* =========================================================================
           STATE & DATA
           ========================================================================= */
        let imagesData = [];
        let filteredData = [];
        let currentLightboxIndex = 0;
        let lbZoomLevel = 1;

        // إنشاء قائمة ببيانات الصور وروابطها تلقائياً
        function generateImagesData() {
            for (let i = 1; i <= TOTAL_IMAGES; i++) {
                let folder = '';
                if (i >= 1 && i <= 99) folder = 'pics';
                else if (i >= 100 && i <= 195) folder = 'pics2'; // تم حذف المسافة
                else if (i >= 196 && i <= 244) folder = 'pics3';

                imagesData.push({
                    id: i,
                    // تم إضافة مسافة بين كلمة img والقوس
                    url: `${GITHUB_BASE_URL}/${folder}/img (${i}).jpg` 
                });
            }
            filteredData = [...imagesData];
        }

        /* =========================================================================
           DOM ELEMENTS
           ========================================================================= */
        const galleryEl = document.getElementById('gallery');
        const searchInput = document.getElementById('search-input');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const countEl = document.getElementById('image-count');
        
        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCounter = document.getElementById('lb-counter');
        const lbClose = document.getElementById('lb-close');
        const lbNext = document.getElementById('lb-next');
        const lbPrev = document.getElementById('lb-prev');

        /* =========================================================================
           PRELOADER & INIT
           ========================================================================= */
        function initPreloader() {
            let percent = 0;
            const percentEl = document.getElementById('loader-percent');
            const preloader = document.getElementById('preloader');

            const interval = setInterval(() => {
                percent += Math.floor(Math.random() * 5) + 1;
                if (percent >= 100) {
                    percent = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        preloader.style.opacity = '0';
                        preloader.style.visibility = 'hidden';
                        initCountUp();
                    }, 500);
                }
                percentEl.innerText = percent + '%';
            }, 30);
        }

        /* =========================================================================
           HERO & BACKGROUND SETUP
           ========================================================================= */
        function setupHero() {
            const heroBg = document.getElementById('hero-bg');
            heroBg.style.backgroundImage = `url('${BACKGROUND_IMG_URL}')`;

            // Parallax Effect
            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth - e.pageX * 2) / 90;
                const y = (window.innerHeight - e.pageY * 2) / 90;
                heroBg.style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
            });
        }

        /* =========================================================================
           AUDIO SETUP
           ========================================================================= */
        const audio = new Audio(MUSIC_URL);
        audio.loop = true;
        let isMusicPlaying = false;
        let hasInteracted = false;

        const playBtn = document.getElementById('play-pause-btn');
        const muteBtn = document.getElementById('mute-btn');
        const muteIcon = muteBtn.querySelector('.mute-icon');

        function toggleMusic() {
            if (isMusicPlaying) {
                audio.pause();
                playBtn.classList.remove('music-playing');
                playBtn.classList.add('music-paused');
            } else {
                audio.play().catch(e => console.log('Audio blocked by browser:', e));
                playBtn.classList.remove('music-paused');
                playBtn.classList.add('music-playing');
            }
            isMusicPlaying = !isMusicPlaying;
        }

        // Autoplay on first interaction
        document.body.addEventListener('click', () => {
            if (!hasInteracted) {
                hasInteracted = true;
                toggleMusic();
            }
        }, { once: true });

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // منع تفعيل الـ Autoplay مرتين
            hasInteracted = true;
            toggleMusic();
        });

        muteBtn.addEventListener('click', () => {
            audio.muted = !audio.muted;
            muteIcon.innerText = audio.muted ? '🔇' : '🔊';
        });

        /* =========================================================================
           RENDER GALLERY
           ========================================================================= */
        // Observer for lazy loading
        const imageObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    img.onload = () => {
                        img.classList.remove('loading');
                        img.classList.add('loaded');
                        img.parentElement.classList.remove('skeleton'); // Remove shimmer
                    };
                    observer.unobserve(img);
                }
            });
        }, { rootMargin: "0px 0px 300px 0px" });

        // Observer for Scroll Reveal Cards
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, { threshold: 0.1 });

        function renderGallery(data) {
            galleryEl.innerHTML = '';
            
            if(data.length === 0) {
                galleryEl.innerHTML = '<h3 style="grid-column: 1/-1; text-align: center; color: var(--text-muted)">No images found.</h3>';
                return;
            }

            data.forEach((imgObj, index) => {
                const card = document.createElement('div');
                card.className = 'card hover-target';
                card.dataset.id = imgObj.id;
                
                // 3D Tilt Effect on hover
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -15; // Max 15deg
                    const rotateY = ((x - centerX) / centerX) * 15;
                    
                    const inner = card.querySelector('.card-inner');
                    inner.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
                });
                
                card.addEventListener('mouseleave', () => {
                    const inner = card.querySelector('.card-inner');
                    inner.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
                });

                card.innerHTML = `
                    <div class="card-inner skeleton">
                        <img data-src="${imgObj.url}" alt="Football Pic ${imgObj.id}" class="loading">
                        <div class="image-number">#${imgObj.id}</div>
                    </div>
                `;

                // Add click listener for Lightbox
                card.addEventListener('click', () => openLightbox(imgObj.id));

                galleryEl.appendChild(card);

                // Observe elements
                const imgElement = card.querySelector('img');
                imageObserver.observe(imgElement);
                revealObserver.observe(card);
            });
        }

        /* =========================================================================
           FILTERS & SEARCH
           ========================================================================= */
        function applyFilterSearch() {
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            const query = parseInt(searchInput.value);

            filteredData = imagesData.filter(img => {
                // Filter logic
                let passFilter = false;
                if (activeFilter === 'all') passFilter = true;
                else if (activeFilter === '1-99' && img.id >= 1 && img.id <= 99) passFilter = true;
                else if (activeFilter === '100-195' && img.id >= 100 && img.id <= 195) passFilter = true;
                else if (activeFilter === '196-244' && img.id >= 196 && img.id <= 244) passFilter = true;

                // Search logic
                let passSearch = true;
                if (!isNaN(query) && query > 0) {
                    passSearch = (img.id === query);
                }

                return passFilter && passSearch;
            });

            renderGallery(filteredData);
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilterSearch();
            });
        });

        searchInput.addEventListener('input', applyFilterSearch);

        /* =========================================================================
           STATS ANIMATION (Count Up)
           ========================================================================= */
        function initCountUp() {
            let start = 0;
            const duration = 2000;
            const startTime = performance.now();

            function updateCount(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // Easing function (easeOutQuart)
                const ease = 1 - Math.pow(1 - progress, 4);
                
                countEl.innerText = Math.floor(ease * TOTAL_IMAGES);

                if (progress < 1) {
                    requestAnimationFrame(updateCount);
                } else {
                    countEl.innerText = TOTAL_IMAGES;
                }
            }
            requestAnimationFrame(updateCount);
        }

        /* =========================================================================
           LIGHTBOX LOGIC
           ========================================================================= */
        function openLightbox(id) {
            currentLightboxIndex = filteredData.findIndex(img => img.id === id);
            updateLightboxContent();
            lightbox.classList.add('active');
            lbZoomLevel = 1;
            lbImg.style.transform = `scale(${lbZoomLevel})`;
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
        }

        function updateLightboxContent() {
            if(filteredData.length === 0) return;
            const currentImg = filteredData[currentLightboxIndex];
            lbImg.src = currentImg.url;
            lbCounter.innerText = `${currentLightboxIndex + 1} / ${filteredData.length}`;
            lbZoomLevel = 1;
            lbImg.style.transform = `scale(${lbZoomLevel})`;
        }

        function nextImage() {
            if(filteredData.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex + 1) % filteredData.length;
            updateLightboxContent();
        }

        function prevImage() {
            if(filteredData.length === 0) return;
            currentLightboxIndex = (currentLightboxIndex - 1 + filteredData.length) % filteredData.length;
            updateLightboxContent();
        }

        lbClose.addEventListener('click', closeLightbox);
        lbNext.addEventListener('click', nextImage);
        lbPrev.addEventListener('click', prevImage);

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // Wheel Zoom inside Lightbox
        lbImg.addEventListener('wheel', (e) => {
            e.preventDefault(); // Prevent page scroll
            if (e.deltaY < 0) lbZoomLevel = Math.min(lbZoomLevel + 0.1, 3); // Zoom in, max 3x
            else lbZoomLevel = Math.max(lbZoomLevel - 0.1, 0.5); // Zoom out, min 0.5x
            lbImg.style.transform = `scale(${lbZoomLevel})`;
        });

        // Swipe on Mobile
        let touchStartX = 0;
        let touchEndX = 0;
        
        lightbox.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        lightbox.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            if (touchEndX < touchStartX - 50) nextImage();
            if (touchEndX > touchStartX + 50) prevImage();
        }

        /* =========================================================================
           BACK TO TOP BUTTON
           ========================================================================= */
        const backToTopBtn = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 500) {
                backToTopBtn.classList.add('show');
            } else {
                backToTopBtn.classList.remove('show');
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        /* =========================================================================
           CUSTOM CURSOR LOGIC
           ========================================================================= */
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        
        document.addEventListener('mousemove', (e) => {
            // Update pure cursor position immediately
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // Follower uses slight delay/smoothness via requestAnimationFrame
            requestAnimationFrame(() => {
                follower.style.left = e.clientX + 'px';
                follower.style.top = e.clientY + 'px';
            });
        });

        // Add hover effect to interactive elements
        const addCursorHover = () => follower.classList.add('cursor-hover');
        const removeCursorHover = () => follower.classList.remove('cursor-hover');

        // Note: Using Event Delegation for performance on dynamically created cards
        document.body.addEventListener('mouseover', (e) => {
            if(e.target.closest('button, input, .hover-target, .card')) {
                addCursorHover();
            }
        });
        document.body.addEventListener('mouseout', (e) => {
            if(e.target.closest('button, input, .hover-target, .card')) {
                removeCursorHover();
            }
        });

        /* =========================================================================
           CANVAS PARTICLES
           ========================================================================= */
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor(x, y, size, speedX, speedY) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speedX = speedX;
                this.speedY = speedY;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                
                // Wrap around edges
                if (this.x > canvas.width) this.x = 0;
                else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                else if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 255, 204, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            const numberOfParticles = (canvas.height * canvas.width) / 10000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = Math.random() * innerWidth;
                let y = Math.random() * innerHeight;
                let speedX = (Math.random() * 1) - 0.5;
                let speedY = (Math.random() * 1) - 0.5;
                particlesArray.push(new Particle(x, y, size, speedX, speedY));
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
        }

        /* =========================================================================
           BOOTSTRAP APPLICATION
           ========================================================================= */
        window.addEventListener('DOMContentLoaded', () => {
            generateImagesData();
            renderGallery(imagesData);
            setupHero();
            initParticles();
            animateParticles();
            initPreloader();
        });

    </script>
</body>
</html>
